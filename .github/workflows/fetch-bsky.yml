name: Fetch Bluesky Feed

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 9am UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Bluesky feed
        run: |
          curl -s "https://public.api.bsky.app/xrpc/app.bsky.feed.getAuthorFeed?actor=nahidscript.bsky.social&limit=20" \
            > src/data/bsky-feed.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/bsky-feed.json
          git diff --staged --quiet || (git commit -m "chore: update bsky feed" && git push)
