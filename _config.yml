site: JOYNAHID
title: Nahid Hasan - joynahid
description: >-
  Nahid Hasan's personal website with his works and all.
googlewebfonts: Fira+Code:wght@400;500;700
lang: en-US
timezone: Dhaka
repo: https://github.com/joynahid.github.io # site repo [optional]
data-theme: light # default theme "dark" | "light"

author:
  name: Nahid
  username: joynahid # general username
  github: joynahid # github username
  twitter: joynahiid # twitter username
  email: nahidhasan282@gmail.com # email adress

# URL settings
url: "https://joynahid.github.io" #
baseurl: "" # leave blank if not wishd
permalink: "https://joynahid.github.io"
permalink: pretty 

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

resume-version: 1.1.3

exclude:
  - .jekyll-cache
  - .obsidian
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - CONTRIBUTING.md
  
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-last-modified-at

# Optional. The default date format, used if none is specified in the tag.
last-modified-at:
    date-format: '%d %b, %y'

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:slug-:day-:month
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled:     true
  collections: false


