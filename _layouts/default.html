<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script
    async
    src="https://www.googletagmanager.com/gtag/js?id=G-YLZ985YY4M"
  ></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "G-YLZ985YY4M");
  </script>

  <body>
    <main>{% include anchor_headings.html html=content anchorBody="#" %}</main>

    <script>
      function setTheme(theme) {
        if (theme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          window.localStorage.setItem("theme", "dark");
          document.getElementById("theme-toggle").classList.add("sun");
          document.getElementById("theme-toggle").classList.remove("moon");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
          window.localStorage.setItem("theme", "light");
          document.getElementById("theme-toggle").classList.add("moon");
          document.getElementById("theme-toggle").classList.remove("sun");
        }
      }

      let theme = localStorage.getItem("theme");

      theme =
        theme ||
        (window.matchMedia
          ? window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light"
          : "light");

      setTheme(theme);

      function modeSwitcher() {
        let currentMode = document.documentElement.getAttribute("data-theme");

        if (currentMode === "dark") {
          setTheme("light");
        } else {
          setTheme("dark");
        }
      }
    </script>
  </body>

  <footer class="social-footer">
    &copy; Nahid Hasan | Updated on {% last_modified_at %}
  </footer>

  {% if page.url == '/' %}
  <script src="{{ site.baseurl }}/assets/js/simple-jekyll-search.js"></script>
  <script>
    var sjs = SimpleJekyllSearch({
      searchInput: document.getElementById("search-input"),
      resultsContainer: document.getElementById("search-results"),
      json: "{{ site.baseurl }}/search.json",
      searchResultTemplate:
        '<li><a href="{url}" title="{desc}">{title}</a></li>',
      noResultsText: "No results found..",
      limit: 10,
      fuzzy: true,
    });
  </script>
  {% endif %}

  <script src="https://code.iconify.design/1/1.0.7/iconify.min.js"></script>
</html>
