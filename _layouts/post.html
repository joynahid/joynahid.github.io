---
layout: default
---

<section class="post">
  <div class="flex-row-between">
    <div>
      <a href="javascript:history.back();"
        ><i class="fas fa-arrow-left"></i> Back</a
      >
      <a href="{{ site.url }}"><i class="fas fa-home"></i> Home</a>
    </div>

    <button title="Change theme" id="theme-toggle" onclick="modeSwitcher()">
      <div></div>
    </button>
  </div>
  <time datetime="{{ page.date | date_to_xmlschema }}"
    >{{ page.date | date: "%b %-d, %Y" }}</time
  >
  <h1 class="title">{{ page.title }}</h1>
  <ul class="meta">
    {% for tag in page.tags %}
    <a href="{{ site.url }}/tag/{{tag}}">{{tag}}</a>
    {% endfor %}
  </ul>
  {{ content }}
</section>

<section>
  <nav class="post-nav">
    {% if page.previous %}
    <a
      class="post-nav-item post-nav-prev"
      href="{{ page.previous | relative_url }}"
    >
      <div class="nav-arrow">Previous</div>
      <span class="post-title">{{ page.previous.title }}</span>
    </a>
    {% endif %} {% if page.next %}
    <a
      class="post-nav-item post-nav-next"
      href="{{ page.next | relative_url }}"
    >
      <div class="nav-arrow">Next</div>
      <span class="post-title">{{ page.next.title }}</span>
    </a>
    {% endif %}
  </nav>
</section>
